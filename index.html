<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diagnóstico del momento — Más Una</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #08080a;
    --bg-card: rgba(20, 20, 26, 0.55);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(203, 108, 230, 0.5);
    --accent: #cb6ce6;
    --accent-soft: rgba(203, 108, 230, 0.12);
    --text: #ffffff;
    --text-dim: #9a9aa6;
    --text-faint: #5a5a66;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  h1, h2, h3, .question, .intro-title, .form-title, .result-title, .intro-eyebrow {
    font-family: 'Outfit', system-ui, -apple-system, sans-serif;
  }

  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(203, 108, 230, 0.15), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(203, 108, 230, 0.08), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 60px;
  }

  .header {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 36px;
    width: 100%;
  }

  .header img {
    max-height: 56px;
    width: auto;
    display: block;
    filter: brightness(0) saturate(100%) invert(58%) sepia(48%) saturate(2476%) hue-rotate(254deg) brightness(96%) contrast(94%);
  }

  .header-fallback {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .container {
    width: 100%;
    max-width: 640px;
  }

  .progress-wrap {
    margin-bottom: 28px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 0.82rem;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .progress-bar {
    height: 4px;
    width: 100%;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #e295f5);
    border-radius: 999px;
    transition: width 500ms cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 12px rgba(203, 108, 230, 0.4);
  }

  .card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    transition: opacity 300ms ease, transform 300ms ease;
  }

  .card.fade-out { opacity: 0; transform: translateY(8px); }
  .card.fade-in { opacity: 1; transform: translateY(0); }

  .intro-eyebrow {
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 14px;
    text-align: center;
  }

  .intro-title {
    font-size: clamp(1.7rem, 4vw, 2.3rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
    text-align: center;
  }

  .intro-text {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 28px;
    line-height: 1.6;
    text-align: justify;
  }

  .question {
    font-size: 1.35rem;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.01em;
    margin-bottom: 24px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 200ms ease;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    font-size: 0.98rem;
    line-height: 1.45;
    width: 100%;
  }

  .option:hover {
    background: rgba(203, 108, 230, 0.06);
    border-color: rgba(203, 108, 230, 0.3);
    transform: scale(1.01);
  }

  .option.selected {
    background: var(--accent-soft);
    border-color: var(--border-strong);
    box-shadow: 0 0 0 1px var(--border-strong), 0 8px 24px rgba(203, 108, 230, 0.15);
  }

  .option-bullet {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 200ms ease;
  }

  .option.selected .option-bullet {
    border-color: var(--accent);
    background: var(--accent);
  }

  .option.selected .option-bullet::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: white;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    gap: 12px;
  }

  .btn {
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 10px;
    padding: 13px 22px;
    cursor: pointer;
    border: none;
    transition: all 200ms ease;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: var(--accent);
    color: #0c0211;
    box-shadow: 0 8px 20px rgba(203, 108, 230, 0.25);
  }
  .btn-primary:hover:not(:disabled) {
    background: #d97deb;
    transform: translateY(-1px);
    box-shadow: 0 12px 28px rgba(203, 108, 230, 0.35);
  }
  .btn-primary:disabled {
    background: rgba(203, 108, 230, 0.2);
    color: rgba(255, 255, 255, 0.4);
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover {
    color: var(--text);
    border-color: rgba(255, 255, 255, 0.2);
  }

  .btn-full {
    width: 100%;
    padding: 15px 22px;
    font-size: 1rem;
  }

  /* Form */
  .form-title {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .form-subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 28px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 7px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .field input {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    transition: all 200ms ease;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(203, 108, 230, 0.05);
    box-shadow: 0 0 0 3px rgba(203, 108, 230, 0.15);
  }
  .field input::placeholder { color: var(--text-faint); }

  .field-error {
    color: #ff6b8a;
    font-size: 0.8rem;
    margin-top: 6px;
    display: none;
  }
  .field.invalid input { border-color: rgba(255, 107, 138, 0.5); }
  .field.invalid .field-error { display: block; }

  /* Result & Social Links */
  .result {
    text-align: center;
    padding: 12px 0;
  }
  .result-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    font-size: 1.8rem;
  }
  .result-title {
    font-size: 1.55rem;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }
  .result-text {
    color: var(--text-dim);
    font-size: 1rem;
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto 24px;
  }

  .social-links {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .social-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.92rem;
    font-weight: 600;
    transition: all 200ms ease;
    background: rgba(255, 255, 255, 0.01);
  }
  .social-btn:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-1px);
  }

  /* Spinner */
  .spinner-wrap {
    text-align: center;
    padding: 20px 0;
  }
  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(203, 108, 230, 0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text {
    color: var(--text-dim);
    font-size: 0.95rem;
    font-weight: 500;
  }

  .footer-note {
    margin-top: 28px;
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-faint);
    letter-spacing: 0.02em;
  }

  @media (max-width: 520px) {
    .card { padding: 28px 22px; border-radius: 16px; }
    .question { font-size: 1.18rem; }
    .intro-title { font-size: 1.6rem; }
    .nav { flex-direction: column-reverse; }
    .nav .btn { width: 100%; }
    .social-links { flex-direction: column; width: 100%; }
    .social-btn { justify-content: center; width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="/logo.png" alt="Más Una" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
  <div class="header-fallback" style="display:none;">mas<span>Una</span></div>
</div>

<div class="container">
  <div class="progress-wrap" id="progressWrap" style="display:none;">
    <div class="progress-meta">
      <span id="progressLabel">Paso 1 de 5</span>
      <span id="progressPct">20%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="card fade-in" id="card">
    <!-- contenido dinámico -->
  </div>

  <div class="footer-note">Diagnóstico del momento · Más Una Live Commerce</div>
</div>

<script>
  // ============================================
  // CONFIGURACIÓN (Pega aquí tus enlaces de Drive)
  // ============================================
  const FORMSPREE_URL = "https://formspree.io/f/xpqnlpql";
  
  // REEMPLAZA ESTOS DOS ENLACES CON TUS PDFs REALES DE GOOGLE DRIVE:
  const URL_GUIA_INICIO = "https://drive.google.com/file/d/PEGA_AQUI_EL_LINK_DE_TU_GUIA_1/view";
  const URL_GUIA_OPTIMIZACION = "https://drive.google.com/file/d/PEGA_AQUI_EL_LINK_DE_TU_GUIA_2/view";
  
  // Tus redes sociales oficiales configuradas:
  const URL_INSTAGRAM = "https://www.instagram.com/masuna_consultora"; 
  const URL_TIKTOK = "https://www.tiktok.com/@masuna_consultora";

  // ============================================
  // ESTRUCTURA DE PREGUNTAS
  // ============================================
  const questions = [
    {
      id: 'P1',
      text: 'De estas frases, ¿cuál se parece más a tu situación hoy?',
      options: [
        { key: 'a', label: '"Tengo el producto y las ganas, pero no sé por dónde empezar con TikTok Live"' },
        { key: 'b', label: '"Ya hago lives pero siento que algo no funciona — entra gente pero no compra"' },
        { key: 'c', label: '"Hice algunos lives, no vi resultados rápidos y lo dejé"' },
        { key: 'd', label: '"Tengo un restaurante o negocio local, no vendo a nivel nacional"' },
        { key: 'e', label: '"Vendo servicios o productos digitales"' },
      ]
    },
    {
      id: 'P2',
      text: '¿Cuál de estos describe mejor tu producto?',
      options: [
        { key: 'a', label: 'Producto físico, fácil de mostrar en cámara, puedo enviarlo por Shalom o equivalente' },
        { key: 'b', label: 'Producto físico pero solo lo vendo en mi tienda o por delivery local' },
        { key: 'c', label: 'Servicio o producto digital' },
        { key: 'd', label: 'Ropa, calzado o producto con tallas' },
      ]
    },
    {
      id: 'P3',
      text: '¿Cuál es el precio promedio de lo que vendes?',
      options: [
        { key: 'a', label: 'Entre S/50 y S/150' },
        { key: 'b', label: 'Menos de S/50' },
        { key: 'c', label: 'Más de S/150' },
        { key: 'd', label: 'Varía mucho' },
      ]
    },
    {
      id: 'P4',
      text: '¿Qué tan seguido estás dispuesto a transmitir?',
      options: [
        { key: 'a', label: 'Puedo comprometerme a 2–3 lives por semana' },
        { key: 'b', label: '1 live por semana' },
        { key: 'c', label: 'Cuando tenga tiempo' },
        { key: 'd', label: 'Prefiero que alguien lo haga por mí' },
      ]
    },
    {
      id: 'P5',
      text: '¿Qué te impide vender más por TikTok Live hoy?',
      options: [
        { key: 'a', label: 'No sé cómo armar el primer live' },
        { key: 'b', label: 'No sé qué decir frente a cámara' },
        { key: 'c', label: 'Hago lives pero entra poca gente' },
        { key: 'd', label: 'Entra gente pero no escriben al WhatsApp' },
        { key: 'e', label: 'Escriben al WhatsApp pero no compran' },
        { key: 'f', label: 'No tengo el equipo (cámara, luz, set)' },
      ]
    },
  ];

  let step = -1; 
  const answers = {};

  const card = document.getElementById('card');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const progressPct = document.getElementById('progressPct');

  function swap(htmlBuilder) {
    card.classList.remove('fade-in');
    card.classList.add('fade-out');
    setTimeout(() => {
      htmlBuilder();
      card.classList.remove('fade-out');
      card.classList.add('fade-in');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 300);
  }

  function updateProgress() {
    if (step < 0 || step > 4) {
      progressWrap.style.display = 'none';
      return;
    }
    progressWrap.style.display = 'block';
    const pct = ((step + 1) / questions.length) * 100;
    progressFill.style.width = pct + '%';
    progressLabel.textContent = `Paso ${step + 1} de ${questions.length}`;
    progressPct.textContent = Math.round(pct) + '%';
  }

  function renderIntro() {
    step = -1;
    updateProgress();
    card.innerHTML = `
      <div class="intro-eyebrow">Diagnóstico del momento</div>
      <h1 class="intro-title">Descubre si tu negocio está listo para vender en TikTok Live.</h1>
      <p class="intro-text">Te haremos 5 preguntas rápidas para entender en qué etapa estás. Al final, recibirás un diagnóstico personalizado y una guía pensada para tu momento.</p>
      <button class="btn btn-primary btn-full" id="startBtn">Empezar diagnóstico</button>
    `;
    document.getElementById('startBtn').addEventListener('click', () => {
      step = 0;
      swap(renderQuestion);
    });
  }

  function renderQuestion() {
    updateProgress();
    const q = questions[step];
    const selected = answers[q.id];

    const optionsHtml = q.options.map(opt => `
      <button class="option ${selected === opt.key ? 'selected' : ''}" data-key="${opt.key}">
        <span class="option-bullet"></span>
        <span>${opt.label}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <h2 class="question">${q.text}</h2>
      <div class="options" id="optionsList">${optionsHtml}</div>
      <div class="nav">
        <button class="btn btn-ghost" id="backBtn" ${step === 0 ? 'style="visibility:hidden"' : ''}>← Atrás</button>
        <button class="btn btn-primary" id="nextBtn" ${selected ? '' : 'disabled'}>${step === questions.length - 1 ? 'Continuar' : 'Siguiente →'}</button>
      </div>
    `;

    document.querySelectorAll('.option').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        answers[q.id] = key;
        document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('nextBtn').disabled = false;
      });
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (!answers[q.id]) return;
      if (step < questions.length - 1) {
        step++;
        swap(renderQuestion);
      } else {
        step = 5;
        swap(renderForm);
      }
    });

    const backBtn = document.getElementById('backBtn');
    if (backBtn) {
      backBtn.addEventListener('click', () => {
        if (step > 0) {
          step--;
          swap(renderQuestion);
        }
      });
    }
  }

  function renderForm() {
    updateProgress();
    card.innerHTML = `
      <h2 class="form-title">Un último paso para recibir tu diagnóstico.</h2>
      <p class="form-subtitle">Déjanos tus datos y te enviaremos el contenido pensado para tu etapa.</p>

      <div class="field" id="f-nombre">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="name" />
        <div class="field-error">Ingresa tu nombre.</div>
      </div>

      <div class="field" id="f-whatsapp">
        <label for="whatsapp">WhatsApp</label>
        <input type="tel" id="whatsapp" placeholder="Ej. 999 888 777" autocomplete="tel" />
        <div class="field-error">Ingresa un número válido.</div>
      </div>

      <div class="field" id="f-correo">
        <label for="correo">Correo</label>
        <input type="email" id="correo" placeholder="tucorreo@ejemplo.com" autocomplete="email" />
        <div class="field-error">Ingresa un correo válido.</div>
      </div>

      <div class="nav">
        <button class="btn btn-ghost" id="backBtn">← Atrás</button>
        <button class="btn btn-primary" id="submitBtn">Unirme a la lista de espera y recibir diagnóstico</button>
      </div>
    `;

    document.getElementById('backBtn').addEventListener('click', () => {
      step = questions.length - 1;
      swap(renderQuestion);
    });

    document.getElementById('submitBtn').addEventListener('click', handleSubmit);
  }

  function validateForm() {
    let ok = true;
    const nombre = document.getElementById('nombre').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();
    const correo = document.getElementById('correo').value.trim();

    const setInvalid = (id, bad) => {
      const el = document.getElementById(id);
      if (bad) el.classList.add('invalid'); else el.classList.remove('invalid');
    };

    setInvalid('f-nombre', nombre.length < 2);
    if (nombre.length < 2) ok = false;

    const phoneClean = whatsapp.replace(/[\s\-()]/g, '');
    const phoneOk = /^\+?\d{6,15}$/.test(phoneClean);
    setInvalid('f-whatsapp', !phoneOk);
    if (!phoneOk) ok = false;

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo);
    setInvalid('f-correo', !emailOk);
    if (!emailOk) ok = false;

    return ok ? { nombre, whatsapp, correo } : null;
  }

  function buildExperienciaSummary(verdict) {
    const labels = questions.map(q => {
      const sel = answers[q.id];
      const opt = q.options.find(o => o.key === sel);
      return `${q.id}: ${opt ? opt.label : '—'}`;
    }).join(' | ');
    return `[${verdict.code}] ${verdict.summary} || ${labels}`;
  }

  async function handleSubmit() {
    const data = validateForm();
    if (!data) return;

    const verdict = computeVerdict();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    const payload = {
      Nombre: data.nombre,
      Whatsapp: data.whatsapp,
      Correo: data.correo,
      Experiencia: buildExperienciaSummary(verdict),
    };

    try {
      await fetch(FORMSPREE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch (e) {
      console.error('Formspree error', e);
    }

    step = 6;
    swap(() => renderResult(verdict));
  }

  function computeVerdict() {
    const p1 = answers.P1, p2 = answers.P2, p5 = answers.P5;

    if (p1 === 'e' || p2 === 'c') {
      return {
        code: 'NO_CALIFICA',
        summary: 'Servicios o producto digital — no califica para Sistema LiveVentas',
        type: 'message',
        title: 'Hoy no es tu momento ideal para TikTok Live.',
        text: 'Sin embargo, te invitamos a seguirnos en nuestra comunidad por si tu modelo cambia.',
      };
    }

    if (p1 === 'd' || p2 === 'b') {
      return {
        code: 'LOCAL',
        summary: 'Negocio local — modelo requiere sistema distinto (TalentoVentas)',
        type: 'message',
        title: 'Tu modelo requiere un sistema distinto.',
        text: 'Síguenos en nuestras redes, próximamente lanzaremos contenido y herramientas específicas para potenciar negocios locales.',
      };
    }

    const productoNacional = (p2 === 'a' || p2 === 'd');

    if (productoNacional) {
      if (p1 === 'a' || p5 === 'a' || p5 === 'b' || p5 === 'f') {
        return {
          code: 'APTO_INICIO',
          summary: 'Apto — necesita Guía de Inicio (primer live + primer mes)',
          type: 'redirect',
          url: URL_GUIA_INICIO,
          title: 'Tu diagnóstico está listo.',
          text: 'Te redirigimos a tu guía personalizada para arrancar.',
        };
      }
      if (p1 === 'b' || p1 === 'c' || p5 === 'c' || p5 === 'd' || p5 === 'e') {
        return {
          code: 'APTO_OPTIMIZACION',
          summary: 'Apto — necesita Guía de Optimización (diagnóstico de live existente)',
          type: 'redirect',
          url: URL_GUIA_OPTIMIZACION,
          title: 'Tu diagnóstico está listo.',
          text: 'Te redirigimos a tu guía personalizada para optimizar.',
        };
      }
    }

    if (productoNacional) {
      return {
        code: 'APTO_INICIO_FALLBACK',
        summary: 'Apto — ruteo fallback a Guía de Inicio',
        type: 'redirect',
        url: URL_GUIA_INICIO,
        title: 'Tu diagnóstico está listo.',
        text: 'Te redirigimos a tu guía personalizada para arrancar.',
      };
    }

    return {
      code: 'INDEFINIDO',
      summary: 'Combinación no contemplada — invitación a seguir redes',
      type: 'message',
      title: 'Tu caso requiere una conversación.',
      text: 'Síguenos en nuestras redes — pronto compartiremos contenido que aplica a tu situación.',
    };
  }

  function renderResult(verdict) {
    progressWrap.style.display = 'none';

    if (verdict.type === 'message') {
      card.innerHTML = `
        <div class="result">
          <div class="result-icon">${verdict.code === 'NO_CALIFICA' ? '🌱' : '🏪'}</div>
          <h2 class="result-title">${verdict.title}</h2>
          <p class="result-text">${verdict.text}</p>
          <div class="social-links">
            <a href="${URL_INSTAGRAM}" target="_blank" class="social-btn">📸 Instagram</a>
            <a href="${URL_TIKTOK}" target="_blank" class="social-btn">🎵 TikTok</a>
          </div>
        </div>
      `;
      return;
    }

    card.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-text">Generando tu diagnóstico personalizado...</div>
      </div>
    `;

    setTimeout(() => {
      window.open(verdict.url, '_blank');
      card.innerHTML = `
        <div class="result">
          <div class="result-icon">✓</div>
          <h2 class="result-title">${verdict.title}</h2>
          <p class="result-text">Si la guía no se abrió automáticamente, <a href="${verdict.url}" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 600;">haz clic aquí</a>.</p>
        </div>
      `;
    }, 2000);
  }

  renderIntro();
</script>

</body>
</html>
